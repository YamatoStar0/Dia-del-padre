<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Día del Padre!</title>
    <style>
        /* Configuración general */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #e0f2fe, #bae6fd);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #1e3a8a;
            overflow: hidden;
        }

        /* Pantalla de Bienvenida (Sorpresa) */
        .pantalla-inicio {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0284c7, #0369a1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .pantalla-inicio.ocultar {
            opacity: 0;
            visibility: hidden;
        }

        /* Botón de Sorpresa */
        .btn-sorpresa {
            background-color: #ffffff;
            color: #0369a1;
            border: none;
            padding: 20px 40px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: pulso 2s infinite;
        }

        .btn-sorpresa:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.3);
        }

        /* Tarjeta principal (oculta al inicio en opacidad) */
        .tarjeta {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.8);
            transform: translateY(20px);
            opacity: 0;
            transition: transform 1s ease 0.5s, opacity 1s ease 0.5s;
        }

        .tarjeta.mostrar {
            opacity: 1;
            transform: translateY(0);
            animation: flotar 3s ease-in-out infinite 1.5s;
        }

        /* Icono de corazón */
        .corazon {
            font-size: 50px;
            color: #ef4444;
            margin-bottom: 15px;
            animation: latido 1.5s infinite;
        }

        /* Título principal */
        h1 {
            font-size: 2.5rem;
            margin: 0 0 20px 0;
            color: #0369a1;
            font-weight: 800;
        }

        /* Texto de dedicatoria */
        p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #334155;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .decoracion {
            font-size: 1.5rem;
            color: #0284c7;
        }

        /* Animaciones */
        @keyframes pulso {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); box-shadow: 0 10px 25px rgba(255,255,255,0.4); }
        }

        @keyframes flotar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes latido {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        /* Regalo animado en la pantalla de inicio */
        .icono-regalo {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: balanceo 1s infinite alternate;
        }

        @keyframes balanceo {
            from { transform: rotate(-10deg); }
            to { transform: rotate(10deg); }
        }
    </style>
</head>
<body>

    <audio id="musica-fondo" src="musica.mp3" loop></audio>

    <div class="pantalla-inicio" id="pantallaInicio">
        <div class="icono-regalo">🎁</div>
        <button class="btn-sorpresa" onclick="revelarSorpresa()">Toca aquí para recibir tu sorpresa</button>
    </div>

    <div class="tarjeta" id="tarjetaPrincipal">
        <div class="corazon">❤️</div>
        <h1>¡Feliz Día del Padre!</h1>
        <p>Te quiero mucho, papá. Eres un gran ejemplo para mí, mi guía y mi mayor apoyo. Gracias por estar siempre ahí y por todo lo que me has enseñado.</p>
        <div class="decoracion">👔✨👑</div>
    </div>

    <script>
        function revelarSorpresa() {
            // 1. Obtener los elementos
            const pantalla = document.getElementById('pantallaInicio');
            const tarjeta = document.getElementById('tarjetaPrincipal');
            const musica = document.getElementById('musica-fondo');

            // 2. Ocultar la pantalla de bienvenida y mostrar la tarjeta
            pantalla.classList.add('ocultar');
            tarjeta.classList.add('mostrar');

            // 3. Reproducir la música
            musica.play().catch(error => {
                console.log("El navegador bloqueó el audio automático:", error);
            });
        }
    </script>
</body>
</html>
